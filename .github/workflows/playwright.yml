name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install UI deps
        working-directory: TodoApp.Ui
        run: npm ci

      - name: Build API
        working-directory: TodoApp.Api
        run: dotnet build

      # START API
      - name: Start API
        working-directory: TodoApp.Api
        run: dotnet run --urls http://127.0.0.1:5000 &

      # START UI
      - name: Start UI
        working-directory: TodoApp.Ui
        run: npm start -- --host 0.0.0.0 --poll=2000 &

      # WAIT BOTH
      - name: Wait for services
        run: npx wait-on --timeout 120000 http://127.0.0.1:4200 http://127.0.0.1:5000

      - name: Install Playwright
        working-directory: TodoApp.Ui
        run: npx playwright install --with-deps

      - name: Run tests
        working-directory: TodoApp.Ui
        run: npx playwright test