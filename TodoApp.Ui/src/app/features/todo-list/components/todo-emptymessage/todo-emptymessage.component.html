<td colspan="7" class="text-center p-8">
  @if (hasError) {
    <div class="flex flex-column align-items-center gap-3">
      <i class="pi pi-exclamation-circle text-red-500" style="font-size: 4rem"></i>
      <div class="text-900 font-bold text-2xl">Unable to Connect</div>
      <p-button label="Try Again" icon="pi pi-refresh" (onClick)="retry.emit()" styleClass="p-button-outlined p-button-secondary mt-2"></p-button>
    </div>
  } @else if (!loading) {
    <div class="flex flex-column align-items-center gap-2">
      <i class="pi pi-inbox text-400" style="font-size: 3rem"></i>
      <div class="text-600 font-medium text-xl">No tasks added yet.</div>
    </div>
  }
</td>
