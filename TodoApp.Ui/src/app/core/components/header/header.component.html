<header class="flex justify-content-between align-items-center mb-5 p-3 shadow-2 border-round-xl bg-white border-1 border-50">
    
    <div class="flex align-items-center gap-3">
        <img src="logo.png" alt="Logo" style="width: 42px; height: 42px; object-fit: contain;">
        <div class="flex flex-column border-left-1 border-300 pl-3">
            <h2 class="m-0 text-900 text-xl font-bold">Todo Dashboard</h2>
            <small class="text-500 font-medium italic">JLG Enterprise Hub</small>
        </div>
    </div>

    <div class="flex align-items-center gap-4">
        
        <div class="flex align-items-center gap-3">
            <p-avatar 
                [label]="getInitial()" 
                shape="circle" 
                size="normal"
                [style]="{'background-color': avatarColor, 'color': '#ffffff', 'font-weight': 'bold'}"
                (click)="menu.toggle($event)">
            </p-avatar>
            <div class="flex flex-column">
                <span class="font-bold text-900 line-height-1">{{ authService.currentUser() }}</span>
                <small class="text-secondary">Welcome back!</small>
            </div>

            <p-menu #menu [model]="menuItems" [popup]="true"appendTo="body"></p-menu>
        </div>

    </div>
</header>
